  <!-- Formulaire Devis -->
  <main class="container" style="margin-top:100px; max-width:800px; color: goldenrod;">
    <h1 class="mb-4 text-center" style="color: blue;">Obtenir un devis</h1>
    <form action="https://formspree.io/f/xxxxxx" method="POST">
      <div class="mb-3">
        <label for="nom" class="form-label">Nom complet</label>
        <input type="text" class="form-control" id="nom" name="nom" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Adresse email</label>
        <input type="email" class="form-control" id="email" name="email" required>
      </div>
      <div class="mb-3">
        <label for="telephone" class="form-label">Téléphone</label>
        <input type="tel" class="form-control" id="telephone" name="telephone">
      </div>
      <div class="mb-3">
        <label for="service" class="form-label">Service souhaité</label>
        <select class="form-select" id="service" name="service">
          <option value="transport">Transport de marchandises</option>
          <option value="location">Location de véhicules</option>
          <option value="formation">Formation</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="details" class="form-label">Détails supplémentaires</label>
        <textarea class="form-control" id="details" name="details" rows="4"></textarea>
      </div>
      <!-- Redirection après envoi -->
      <input type="hidden" name="_redirect" value="merci.html">
      <button type="submit" class="btn btn-primary w-100" style="color: black;">Envoyer la demande de devis</button>
    </form>
  </main>
